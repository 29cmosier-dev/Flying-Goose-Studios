name: Daily Scraper
on:
  schedule:
    - cron: '0 * * * *' # Runs at the start of every hour
  workflow_dispatch: # Keep this! It's great for manual testing.

jobs:
  build:
    runs-on: ubuntu-latest
    # Add these permissions so the bot can push the CSV back to the repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Updated to v3 (more stable)

      - name: Set up Python
        uses: actions/setup-python@v4 # Updated to v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Scraper Bot"
          git config --global user.email "bot@github.com"
          git add stats.csv
          # The '|| exit 0' prevents the action from failing if there's nothing new to commit
          git commit -m "Update stats" || exit 0
          git push
